services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=dialog_backend.settings
    command: >
      sh -c "
      poetry run python manage.py migrate &&
      poetry run python manage.py runserver 0.0.0.0:8040
      "
    volumes:
      - ./:/home/django/dialog_backend
    ports:
      - "8040:8040"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - celery-beat
      - celery-worker
    networks:
      - dialog_network

  postgres:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql@14/data
      - ./sql_dump:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-1234}
      - POSTGRES_DB=${POSTGRES_DB:-dialog}
    networks:
      - dialog_network

  redis:
    image: redis:7
    container_name: redis_cache
    restart: always
    networks:
      - dialog_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-guest}
    networks:
      - dialog_network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/dialog_backend
    command: celery -A dialog_backend worker --loglevel=info
    volumes:
      - ./:/app
    depends_on:
      - postgres
      - rabbitmq
      - celery-beat
    networks:
      - dialog_network

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/dialog_backend
    command: celery -A dialog_backend beat --loglevel=info
    volumes:
      - ./:/app
    env_file:
      - ./dialog_backend/dialog_backend/.env
    depends_on:
      - postgres
      - rabbitmq
      - flower
    networks:
      - dialog_network

  flower:
    image: mher/flower
    environment:
      - CELERY_BROKER_URL=pyamqp://${RABBITMQ_DEFAULT_USER:-guest}@rabbitmq//
      - FLOWER_PORT=${FLOWER_PORT:-5555}
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
    networks:
      - dialog_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./site.conf:/etc/nginx/conf.d/site.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    extra_hosts:
      - "crm.com:host-gateway"
    networks:
      - dialog_network
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./dialog_frontend
      dockerfile: Dockerfile
    working_dir: /home/frontend
    command: npm run dev
    volumes:
      - ./dialog_frontend:/home/frontend
      - /home/frontend/node_modules
    ports:
      - "8300:8300"
    depends_on:
      - backend
    networks:
      - dialog_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  dialog_network:
    external: true
